<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Noon Chat</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#e5ddd5;
  height:100vh;
}

/* يخلي الشات يملأ الشاشة */
.chat-container {
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#efeae2;
}

/* الهيدر ثابت */
.header {
  background:#FEE500;
  padding:15px;
  font-weight:bold;
}

/* الشات يتمدد */
.chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

/* input ثابت تحت */
.input-area {
  display:flex;
  padding:10px;
  background:#f0f0f0;
}

.chat-container {
  width:400px;
  height:600px;
  background:#fff;
  display:flex;
  flex-direction:column;
  border-radius:15px;
  overflow:hidden;
}

.header {
  background:#FEE500;
  padding:15px;
  font-weight:bold;
}

.chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.row {
  display:flex;
  margin:5px;
}

.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  margin-right:5px;
}

.message {
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.bot { background:#fff; }
.user { background:#dcf8c6; margin-left:auto; }

.time {
  font-size:10px;
  color:gray;
}

.input-area {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  margin-left:10px;
  background:#FEE500;
  border:none;
  padding:10px;
}

/* typing */
.typing span {
  display:inline-block;
  width:6px;
  height:6px;
  background:#999;
  margin:2px;
  border-radius:50%;
  animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes bounce {
  0%,80%,100%{transform:scale(0);}
  40%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🚚 Noon Assistant</div>
  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">إرسال</button>
  </div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];
let chatData = JSON.parse(localStorage.getItem("chat")) || [];

function time(){
  let d=new Date();
  return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
}

function render(){
  let chat=document.getElementById("chat");
  chat.innerHTML="";

  chatData.forEach(m=>{
    if(m.role==="user"){
      chat.innerHTML+=`
      <div class="row" style="justify-content:flex-end">
        <div>
          <div class="message user">${m.text}</div>
          <div class="time">${m.time}</div>
        </div>
      </div>`;
    }else{
      chat.innerHTML+=`
      <div class="row">
        <img class="avatar" src="https://i.imgur.com/6VBx3io.png">
        <div>
          <div class="message bot">${m.text}</div>
          <div class="time">${m.time}</div>
        </div>
      </div>`;
    }
  });

  chat.scrollTop=chat.scrollHeight;
}

render();

function send(){
  let input=document.getElementById("msg");
  let msg=input.value.trim();
  if(!msg) return;

  chatData.push({role:"user",text:msg,time:time()});
  history.push({role:"user",content:msg});

  localStorage.setItem("chat",JSON.stringify(chatData));
  localStorage.setItem("history",JSON.stringify(history));

  render();
  input.value="";

  const id="t"+Date.now();
  document.getElementById("chat").innerHTML+=`
  <div class="row" id="${id}">
    <img class="avatar" src="https://i.imgur.com/6VBx3io.png">
    <div class="message bot">
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>`;

  fetch("https://eouzdbt3b247439.m.pipedream.net/",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:msg,
      history:history
    })
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById(id).remove();

    document.getElementById("sound").play();

    chatData.push({role:"bot",text:d.reply,time:time()});
    history.push({role:"assistant",content:d.reply});

    localStorage.setItem("chat",JSON.stringify(chatData));
    localStorage.setItem("history",JSON.stringify(history));

    render();
  });
}

</script>

</body>
</html>
