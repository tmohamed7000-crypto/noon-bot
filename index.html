<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Noon Delivery Assistant</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}
.header {
  background: #FEE500;
  padding: 15px;
  font-weight: bold;
}
.chat {
  padding: 10px;
  height: 400px;
  overflow-y: auto;
}
.bot {
  background: #fff;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
}
.user {
  background: #dcf8c6;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: right;
}
input {
  width: 70%;
  padding: 10px;
}
button {
  padding: 10px;
  background: #FEE500;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">🚚 Noon Delivery Assistant</div>

<div class="chat" id="chat">
  <div class="bot">أهلاً 👋 معاك عبدالرحمن، ممكن أعرف اسمك؟</div>
</div>

<input id="msg" placeholder="اكتب هنا...">
<button onclick="send()">إرسال</button>

<script>

// 🔥 تخزين المحادثة
let history = [];

async function send() {
  let input = document.getElementById("msg");
  let msg = input.value.trim();
  let chat = document.getElementById("chat");

  if (!msg) return;

  // عرض رسالة المستخدم
  chat.innerHTML += `<div class="user">${msg}</div>`;
  chat.scrollTop = chat.scrollHeight;

  // حفظ في history
  history.push({ role: "user", content: msg });

  input.value = "";

  // loading
  let loadingId = "l" + Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}">⏳ جاري الرد...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://eouzdbt3b247439.m.pipedream.net/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg,
        history: history
      })
    });

    const data = await res.json();

    document.getElementById(loadingId).remove();

    chat.innerHTML += `<div class="bot">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

    // حفظ رد البوت
    history.push({ role: "assistant", content: data.reply });

  } catch (err) {
    document.getElementById(loadingId).remove();

    chat.innerHTML += `<div class="bot">❌ حصل خطأ</div>`;
  }
}
</script>

</body>
</html>
