<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noon Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5ddd5;
  direction: rtl;
}

/* container */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* header */
.header {
  background: #FEE500;
  padding: 15px;
  font-weight: bold;
}

/* messages */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* message row */
.message {
  display: flex;
  margin: 5px 0;
}

.message.bot {
  justify-content: flex-start;
}

.message.user {
  justify-content: flex-end;
}

/* avatar */
.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  margin: 5px;
}

/* bubble */
.bubble {
  padding: 10px;
  border-radius: 15px;
  max-width: 60%;
  position: relative;
  font-size: 14px;
}

.bot .bubble {
  background: white;
}

.user .bubble {
  background: #dcf8c6;
}

/* time */
.time {
  font-size: 10px;
  margin-top: 3px;
  color: gray;
}

/* input */
.input-area {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-right: 5px;
  padding: 10px 15px;
  border: none;
  background: #FEE500;
  border-radius: 20px;
}

/* typing dots */
.typing {
  display: flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: gray;
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">🚚 Noon Assistant</div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="اكتب هنا...">
    <button onclick="send()">إرسال</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");

/* 🕒 الوقت */
function getTime() {
  let d = new Date();
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
}

/* 💾 حفظ الشات */
function saveChat() {
  localStorage.setItem("chat", chat.innerHTML);
}

/* 📥 تحميل الشات */
function loadChat() {
  chat.innerHTML = localStorage.getItem("chat") || "";
}

/* 💬 إضافة رسالة */
function addMessage(text, type) {
  chat.innerHTML += `
    <div class="message ${type}">
      ${type === "bot" ? '<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" class="avatar">' : ''}
      <div>
        <div class="bubble">${text}</div>
        <div class="time">${getTime()}</div>
      </div>
    </div>
  `;
  chat.scrollTop = chat.scrollHeight;
  saveChat();
}

/* ⏳ typing */
function typingIndicator() {
  chat.innerHTML += `
    <div class="message bot" id="typing">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" class="avatar">
      <div class="bubble typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  `;
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  let el = document.getElementById("typing");
  if (el) el.remove();
}

/* 🚀 إرسال */
function send() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.push({ role: "user", content: msg });

  if (history.length > 10) {
    history = history.slice(-10);
  }

  addMessage(msg, "user");
  document.getElementById("msg").value = "";

  typingIndicator();

  fetch("https://eouzdbt3b247439.m.pipedream.net/", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: msg,
      history: history
    })
  })
  .then(res => res.json())
  .then(data => {
    removeTyping();
    addMessage(data.reply, "bot");

    history.push({ role: "assistant", content: data.reply });
    localStorage.setItem("history", JSON.stringify(history));
  })
  .catch(() => {
    removeTyping();
    addMessage("حصل خطأ 😅", "bot");
  });
}

/* ⌨️ Enter */
document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

/* تحميل الشات */
loadChat();

/* رسالة البداية */
if (!localStorage.getItem("chat")) {
  addMessage("أهلاً 👋 معاك عبدالرحمن، ممكن أساعدك في متابعة طلبك؟", "bot");
}
</script>

</body>
</html>
