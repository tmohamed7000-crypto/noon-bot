<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Noon Delivery Assistant</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.header {
  background: #FEE500;
  padding: 15px;
  font-weight: bold;
}

.chat {
  padding: 10px;
  height: 400px;
  overflow-y: auto;
}

.bot {
  background: #fff;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #dcf8c6;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: right;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #FEE500;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="header">🚚 Noon Delivery Assistant</div>

<div class="chat" id="chat">
  <div class="bot">أهلاً 👋 معاك مساعد عبدالرحمن، قولّي طلبك أو بياناتك</div>
</div>

<input id="msg" placeholder="اكتب هنا...">
<button onclick="send()">إرسال</button>

<script>
async function send() {
  let input = document.getElementById("msg");
  let msg = input.value.trim();
  let chat = document.getElementById("chat");

  // 🛑 منع الفاضي
  if (!msg) return;

  // 👤 رسالة المستخدم
  chat.innerHTML += `<div class="user">${msg}</div>`;
  chat.scrollTop = chat.scrollHeight;

  input.value = "";

  // ⏳ لودينج
  let loadingId = "loading-" + Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}">⏳ جاري الرد...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://eouzdbt3b247439.m.pipedream.net/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    // ❌ شيل اللودينج
    document.getElementById(loadingId).remove();

    // 🤖 رد البوت
    chat.innerHTML += `<div class="bot">${data.reply || "حصل خطأ"}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById(loadingId).remove();

    chat.innerHTML += `<div class="bot">❌ حصل خطأ في الاتصال</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>

</body>
</html>
