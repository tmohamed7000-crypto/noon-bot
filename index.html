<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Noon Delivery Assistant</title>
<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}
.header {
  background: #FEE500;
  padding: 15px;
  font-weight: bold;
}
.chat {
  padding: 10px;
}
.bot {
  background: #fff;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
}
.user {
  background: #dcf8c6;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  text-align: right;
}
input {
  width: 80%;
  padding: 10px;
}
button {
  padding: 10px;
  background: #FEE500;
  border: none;
}
</style>
</head>

<body>

<div class="header">🚚 Noon Delivery Assistant</div>

<div class="chat" id="chat">
  <div class="bot">أهلاً 👋 معاك مساعد عبدالرحمن، قولّي طلبك أو بياناتك</div>
</div>

<input id="msg" placeholder="اكتب هنا...">
<button onclick="send()">إرسال</button>

<script>
function send() {
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="user">${msg}</div>`;

  fetch("https://eouzdbt3b247439.m.pipedream.net/", {, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  })
  .then(res => res.json())
  .then(data => {
    chat.innerHTML += `<div class="bot">${data.reply}</div>`;
  });

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
